<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <ul class="nav">
                <li><img src="images/icons/VF.JPG" alt="VF">Vintage Food</li>
                <li><b>Главная</b></li>
                <li>Акции</li>
                <li>О нас</li>
                <li><img src="images/icons/shop.JPG" alt="Shop"></li>
            </ul>
        </div>
    </header>

    <main>
        <div class="container">
            <section class="welcome">
                <ul>
                    <li>
                        <h2>Быстрая доставка для Вас</h2>
                        <p>Сделай первый заказ и получи скидку 50%</p>
                        <input type="submit" value="Заказать" id="getOffer">
                    </li>
                    <li><img src="images/bidBURGER.JPG" alt="burger" id="imgBurger"></li>
                </ul>
            </section>

            <section class="menu">
                <h2>Меню</h2>
                <div class="cards">
                    <div class="card">
                        <figure>
                            <img src="images/burger.JPG" alt="burgers">
                            <figcaption>Бургеры</figcaption>
                        </figure>
                    </div>

                    <div class="card">
                        <figure>
                            <img src="images/dishesFromChickens.JPG" alt="dishesFromChickens">
                            <figcaption>Блюда из курицы</figcaption>
                        </figure>
                    </div>
                    
                    <div class="card">
                        <figure>
                            <img src="images/hotDishes.JPG" alt="hotDishes">
                            <figcaption>Горячие блюда</figcaption>
                        </figure>
                    </div>

                    <div class="card">
                        <figure>
                            <img src="images/appetizers.JPG" alt="appetizers">
                            <figcaption>Закуски</figcaption>
                        </figure>
                    </div>

                    <div class="card">
                        <figure>
                            <img src="images/salats.JPG" alt="salats">
                            <figcaption>Салаты</figcaption>
                        </figure>
                    </div>
                    
                    <div class="card">
                        <figure>
                            <img src="images/desserts.JPG" alt="desserts">
                            <figcaption>Десерты</figcaption>
                        </figure>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <section class="info">
                <p>Программа лояльности</p>
                <p>Политика конфидециальности</p>
                <p>Договор аферты</p>
                
        </section>

        <section>
            <p>ООО "Vintage Food"</p>
            <p>@Все права  защищены</p>
        </section>

        <section class="socials">
            <img src="images/icons/vk.JPG" alt="vk">
            <img src="images/icons/tg.JPG" alt="tg">
        </section>
    </footer>
</body>
</html>
